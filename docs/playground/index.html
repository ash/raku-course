<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Raku Playground has moved to raku.online</title>
<meta name="robots" content="noindex">
<!-- The course playground is now a single, shared instance at raku.online, so
     there is only one version to maintain. This page forwards visitors there,
     carrying any query string and #fragment so existing share links keep
     working: course.raku.org/playground/#code=… → raku.online/#code=… , and
     ?gh= / ?gist= / ?url= / &run / &stdin are preserved too. -->
<script>
  location.replace('https://raku.online/' + location.search + location.hash);
</script>
<!-- Fallback if JavaScript is disabled (can't carry the #fragment, but gets you there). -->
<meta http-equiv="refresh" content="0; url=https://raku.online/">
<style>
  body { margin: 0; height: 100vh; display: grid; place-items: center;
         font: 15px/1.6 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
         color: #1b1d23; background: #f6f7f9; }
  @media (prefers-color-scheme: dark) { body { color: #e6e6e6; background: #1b1d23; } }
  a { color: #268bd2; }
</style>
</head>
<body>
  <p>The Raku playground has moved to <a href="https://raku.online/">raku.online</a>. Redirecting…</p>
</body>
</html>
